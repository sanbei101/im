name: 集成测试
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: setup go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
          cache-dependency-path: 'go.sum'

      - name: build server
        run: |
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o worker ./cmd/worker
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o gateway ./cmd/gateway
          GOEXPERIMENT=jsonv2 CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o api ./cmd/api
    
      - name: Connect to Tailscale network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action
          hostname: bench-server

      - name: Start services with docker-compose
        run: |
          docker compose up -d --wait postgres redis

      - name: run server
        run: |
          touch server.log

          nohup ./worker >> server.log 2>&1 &
          WORKER_PID=$!
          echo $WORKER_PID > worker.pid
          
          nohup ./gateway >> server.log 2>&1 &
          GATEWAY_PID=$!
          echo $GATEWAY_PID > gateway.pid
          
          nohup ./api >> server.log 2>&1 &
          API_PID=$!
          echo $API_PID > api.pid
          
          sleep 3
          
          for pid in $WORKER_PID $GATEWAY_PID $API_PID; do
            if ! kill -0 $pid 2>/dev/null; then
              echo "❌ 进程 $pid 已退出!"
              echo "=== Server Log ==="
              cat server.log
              exit 1
            fi
          done
          
          echo "✅ 所有服务已启动"
        env:
          POSTGRES_DSN: "host=localhost port=5432 user=myuser password=mypassword dbname=database sslmode=disable"
          REDIS_ADDR: "localhost:6379"
          REDIS_PASSWORD: "123456"
          REDIS_DB: "0"
          
      - name: see log
        run: tail -n 100 server.log
      
      - name: 触发k6压测
        run: |
          echo "通知 k6 节点开始压测..."
          echo "ready" | nc -N bench-k6 9999

      - name: Install dependencies with cache
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: redis-tools, postgresql-client
          version: 1.0

      - name: 等待 K6 Setup 完成
        run: |
          nc -l 9999
          echo "🚀 K6 已就绪,开始监测..."

      - name: Run monitor and wait for k6
        working-directory: bench
        run: |
          chmod +x monitor.sh
          ./monitor.sh &> >(tee monitor.log) &
          MONITOR_PID=$!
          echo $MONITOR_PID > /tmp/monitor.pid

      - name: Wait for k6 to finish
        run: |
          MONITOR_PID=$(cat /tmp/monitor.pid)
          echo "等待 k6 节点发送压测结束信号..."
          msg=$(nc -l 9999)
          echo "收到消息: $msg"
          test "$msg" = "done"
          echo "🎉 收到 k6 结束信号,准备生成报告!"
          kill -9 "$MONITOR_PID" || true

      - name: Publish Server Monitor Summary
        working-directory: bench
        if: always()
        run: |
          echo "### 📋 监控日志" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 monitor.log >> $GITHUB_STEP_SUMMARY || echo "No monitor.log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: docker compose down

  k6:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Connect to Tailscale network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action
          hostname: bench-k6
          ping: bench-server

      - uses: grafana/setup-k6-action@v1
    
      - name: 等待 Server 就绪
        run: |
          msg=$(nc -l 9999)
          echo "收到消息: $msg"
          test "$msg" = "ready"

      - name: Run k6 and collect pprof
        working-directory: bench
        run: |
          touch k6.log

          k6 --quiet run k6.js -e TARGET_HOST=bench-server &> >(tee k6.log) &
          K6_PID=$!

          echo "等待 k6 setup 阶段完成..."
          grep -q -m 1 "Setup complete" <(tail -f k6.log)
          echo "🚀 Setup 完成, 流量已启动"

      - name: 触发 Server 监控
        run: |
          echo "ready" | nc -N bench-server 9999
          echo "🚀 已通知 Server 开始监控"

      - name: Collect Pprof Profiles
        working-directory: bench
        run: |
          curl -s -o worker_cpu.prof "http://bench-server:6063/debug/pprof/profile?seconds=20" &
          WORKER_CPU_PID=$!
          curl -s -o gateway_cpu.prof "http://bench-server:6062/debug/pprof/profile?seconds=20" &
          GATEWAY_CPU_PID=$!

          (sleep 10 && curl -s -o worker_heap.prof "http://bench-server:6063/debug/pprof/heap") &
          WORKER_HEAP_PID=$!
          (sleep 10 && curl -s -o gateway_heap.prof "http://bench-server:6062/debug/pprof/heap") &
          GATEWAY_HEAP_PID=$!

          wait $WORKER_CPU_PID || true
          wait $GATEWAY_CPU_PID || true
          wait $WORKER_HEAP_PID || true
          wait $GATEWAY_HEAP_PID || true
          
          wait $K6_PID
          K6_EXIT=$?
          echo "$K6_EXIT" > k6_exit_code.txt
          
      - name: 通知 Server 压测结束
        run: |
          echo "通知 Server 压测已结束..."
          echo "done" | nc -N bench-server 9999

      - name: Publish K6 and Profiling Summary
        working-directory: bench
        if: always()
        run: |
          echo "### 🔥 CPU Profile" >> $GITHUB_STEP_SUMMARY

          echo "#### Gateway CPU Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 -cum gateway_cpu.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Worker CPU Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 -cum worker_cpu.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Gateway Heap - In Use" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -sample_index=inuse_space -nodecount=15 gateway_heap.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Worker Heap - Alloc Space" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -sample_index=alloc_space -nodecount=15 worker_heap.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 🚀 k6 压测结果" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 k6.log >> $GITHUB_STEP_SUMMARY || echo "No k6.log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          K6_EXIT=$(cat k6_exit_code.txt || echo 1)
          exit "$K6_EXIT"