name: 集成测试
on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Connect to Tailscale network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action
          hostname: bench-server

      - name: Start services with docker-compose
        run: |
          docker compose up -d
          docker compose logs im --tail=100

      - name: Install dependencies with cache
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: redis-tools, postgresql-client
          version: 1.0

      - name: Run monitor and wait for k6
        working-directory: bench
        run: |
          chmod +x monitor.sh
          # 后台运行 monitor
          ./monitor.sh &> >(tee monitor.log) &
          MONITOR_PID=$!

          echo "🚀 Server 就绪,正在监听内网请求..."
          echo "等待 k6 节点发送压测结束信号..."
          
          # 启动一个临时的 TCP 监听,当 k6 跑完后会请求这个端口,打破阻塞
          nc -l -p 9999
          
          echo "🎉 收到 k6 结束信号,准备生成报告!"
          kill -9 "$MONITOR_PID" || true

      - name: Publish Server Monitor Summary
        working-directory: bench
        if: always()
        run: |
          echo "### 📋 监控日志" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 monitor.log >> $GITHUB_STEP_SUMMARY || echo "No monitor.log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: docker compose down

  bench_client:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Connect to Tailscale network
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-action
          hostname: bench-k6
          ping: bench-server

      - uses: grafana/setup-k6-action@v1
      
      - name: 等待 Server 节点上线
        run: |
          echo "正在寻找 bench-server..."
          until tailscale ping -c 1 bench-server; do
            sleep 2
          done
          echo "✅ 网络连通成功!"

      - name: Run k6 and collect pprof
        working-directory: bench
        run: |
          touch k6.log
          
          k6 --quiet run k6.js -e TARGET_HOST=bench-server &> >(tee k6.log) &
          K6_PID=$!

          echo "等待 k6 setup 阶段完成..."
          grep -q -m 1 "Setup complete" <(tail -f k6.log)
          echo "🚀 Setup 完成, 流量已启动, 开始通过内网采集 Server Pprof"

          curl -s -o worker_cpu.prof "http://bench-server:6063/debug/pprof/profile?seconds=20" &
          WORKER_CPU_PID=$!
          curl -s -o gateway_cpu.prof "http://bench-server:6062/debug/pprof/profile?seconds=20" &
          GATEWAY_CPU_PID=$!

          (sleep 10 && curl -s -o worker_heap.prof "http://bench-server:6063/debug/pprof/heap") &
          WORKER_HEAP_PID=$!
          (sleep 10 && curl -s -o gateway_heap.prof "http://bench-server:6062/debug/pprof/heap") &
          GATEWAY_HEAP_PID=$!

          wait $WORKER_CPU_PID || true
          wait $GATEWAY_CPU_PID || true
          wait $WORKER_HEAP_PID || true
          wait $GATEWAY_HEAP_PID || true
          
          wait $K6_PID
          K6_EXIT=$?
          echo "$K6_EXIT" > k6_exit_code.txt
          
          echo "通知 Server 压测已结束..."
          curl -s http://bench-server:9999 || true

      - name: Publish K6 and Profiling Summary
        working-directory: bench
        if: always()
        run: |
          echo "### 🔥 CPU Profile" >> $GITHUB_STEP_SUMMARY

          echo "#### Gateway CPU Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 gateway_cpu.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Worker CPU Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 worker_cpu.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 💾 Heap Profile" >> $GITHUB_STEP_SUMMARY
          echo "#### Gateway Heap Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 gateway_heap.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Worker Heap Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 worker_heap.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 🚀 k6 压测结果" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 k6.log >> $GITHUB_STEP_SUMMARY || echo "No k6.log found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          K6_EXIT=$(cat k6_exit_code.txt || echo 1)
          exit "$K6_EXIT"