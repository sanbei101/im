name: 集成测试
on:
  workflow_call:
  workflow_dispatch:

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start services with docker-compose
        run: |
          docker compose up -d
          docker compose logs

      - uses: grafana/setup-k6-action@v1

      - name: Install dependencies with cache
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: redis-tools, postgresql-client
          version: 1.0

      - name: Run monitor and k6
        working-directory: bench
        run: |
          chmod +x monitor.sh
          ./monitor.sh &> >(tee monitor.log) &
          MONITOR_PID=$!

          touch k6.log
          k6 --quiet run k6.js &> >(tee k6.log) &
          K6_PID=$!

          echo "等待 k6 setup 阶段完成..."
          grep -q -m 1 "Setup complete" <(tail -f k6.log)
          echo "🚀 Setup 完成,流量已启动,开始采集 pprof"

          curl -s -o worker_cpu.prof "http://localhost:6063/debug/pprof/profile?seconds=20" &
          WORKER_CPU_PID=$!
          curl -s -o gateway_cpu.prof "http://localhost:6062/debug/pprof/profile?seconds=20" &
          GATEWAY_CPU_PID=$!

          (sleep 10 && curl -s -o worker_heap.prof "http://localhost:6063/debug/pprof/heap") &
          WORKER_HEAP_PID=$!
          (sleep 10 && curl -s -o gateway_heap.prof "http://localhost:6062/debug/pprof/heap") &
          GATEWAY_HEAP_PID=$!

          wait $WORKER_CPU_PID || true
          wait $GATEWAY_CPU_PID || true
          wait $WORKER_HEAP_PID || true
          wait $GATEWAY_HEAP_PID || true
          
          wait $K6_PID
          K6_EXIT=$?

          kill -9 "$MONITOR_PID" || true
          echo "$K6_EXIT" > k6_exit_code.txt

      - name: Publish summary
        working-directory: bench
        if: always()
        run: |
          echo "### 🔥 CPU Profile" >> $GITHUB_STEP_SUMMARY

          echo "#### Gateway CPU Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 gateway_cpu.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Worker CPU Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 worker_cpu.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 💾 Heap Profile" >> $GITHUB_STEP_SUMMARY
          echo "#### Gateway Heap Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 gateway_heap.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "#### Worker Heap Top 20" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool pprof -text -nodecount=20 worker_heap.prof 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Cannot parse" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 📋 监控日志" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 monitor.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "### 🚀 k6 压测结果" >> $GITHUB_STEP_SUMMARY
          echo '```log' >> $GITHUB_STEP_SUMMARY
          tail -n 100 k6.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          K6_EXIT=$(cat k6_exit_code.txt)
          exit "$K6_EXIT"

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yaml down
